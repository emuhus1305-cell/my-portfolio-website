<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          Eman <span>Hussen</span>
          <small>~ full-stack engineer in progress ~</small>
        </div>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="projects.html">projects</a></li>
          <li><a href="interests.html">Interests</a></li>
          <li><a href="recommendations.html">Recommendations</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <div class="section-title">
          <h2>Get in <span class="highlight">Touch</span></h2>
          <p>
            I'd love to hear from you! Whether you have a question, a project
            idea, or just want to connect — feel free to reach out.
          </p>
        </div>

        <form action="#" method="post">
          <p>
            <label for="name">
              Your name
              <span class="required">*</span>
            </label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your full name"
              required
            />
          </p>

          <p>
            <label for="email">
              Your email
              <span class="required">*</span>
            </label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </p>

          <p>
            <label for="message">
              Message
              <span class="required">*</span>
            </label>
            <textarea
              id="message"
              name="message"
              rows="5"
              placeholder="Write your message here..."
              required
            ></textarea>
          </p>

          <p>
            <button type="submit">Send Message</button>
          </p>
        </form>
      </section>
    </main>

    <footer>
      <p>© 2026 Eman Hussen. Built with <span class="heart">❤</span></p>
    </footer>
  </body>
